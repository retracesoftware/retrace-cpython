name: Build patched CPython

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: "Exact version, manifest-all, or manifest-latest"
        required: true
        default: "manifest-all"
        type: string
      release_tag:
        description: "Git tag / GitHub Release to build from; empty uses the current tag or v<VERSION>"
        required: false
        type: string
      target:
        description: "Platform target to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - linux-x64
          - linux-arm64
          - macos-intel
          - macos-arm64
          - windows-x64
          - windows-x86
          - windows-arm64
          - none
      package_version:
        description: "Exact Retrace package version; empty reads VERSION from the release tag"
        required: false
        type: string
      release_build:
        description: "Use optimized CPython configure flags on POSIX builds"
        required: true
        default: false
        type: boolean
      skip_tests:
        description: "Skip CPython test suites before packaging"
        required: true
        default: false
        type: boolean
      upload_artifacts:
        description: "Upload workflow-run runtime/wheel artifacts"
        required: true
        default: true
        type: boolean
      upload_release_assets:
        description: "Upload missing wheels to the GitHub Release for the release tag"
        required: true
        default: true
        type: boolean
      publish_pypi:
        description: "Publish all wheel assets from the GitHub Release to PyPI"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ inputs.release_tag || github.ref }}-${{ inputs.python_version || 'manifest-all' }}-${{ inputs.target || 'all' }}-${{ inputs.publish_pypi || false }}
  cancel-in-progress: true

env:
  RELEASE_BUILD: ${{ inputs.release_build || false }}
  SKIP_TESTS: ${{ inputs.skip_tests || false }}
  UPLOAD_ARTIFACTS: ${{ inputs.upload_artifacts }}
  UPLOAD_RELEASE_ASSETS: ${{ inputs.upload_release_assets }}
  PUBLISH_PYPI: ${{ inputs.publish_pypi || false }}

jobs:
  versions:
    name: Select CPython versions
    runs-on: ubuntu-24.04
    outputs:
      package_version: ${{ steps.package_version.outputs.package_version }}
      release_tag: ${{ steps.package_version.outputs.release_tag }}
      checkout_ref: ${{ steps.package_version.outputs.checkout_ref }}
      versions: ${{ steps.versions.outputs.versions }}
      posix_platforms: ${{ steps.versions.outputs.posix_platforms }}
      windows_platforms: ${{ steps.versions.outputs.windows_platforms }}
      has_posix: ${{ steps.versions.outputs.has_posix }}
      has_windows: ${{ steps.versions.outputs.has_windows }}
    steps:
      - name: Check out retrace-cpython
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag and package version
        id: package_version
        env:
          PACKAGE_VERSION_INPUT: ${{ inputs.package_version || '' }}
          RELEASE_TAG_INPUT: ${{ inputs.release_tag || '' }}
          GITHUB_REF_TYPE_VALUE: ${{ github.ref_type }}
          GITHUB_REF_NAME_VALUE: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          release_tag="${RELEASE_TAG_INPUT#refs/tags/}"
          if [[ -z "${release_tag}" && "${GITHUB_REF_TYPE_VALUE}" == "tag" ]]; then
            release_tag="${GITHUB_REF_NAME_VALUE}"
          fi
          if [[ -z "${release_tag}" ]]; then
            if [[ -n "${PACKAGE_VERSION_INPUT}" ]]; then
              version_for_tag="${PACKAGE_VERSION_INPUT#v}"
            else
              version_for_tag="$(scripts/package-version)"
            fi
            release_tag="v${version_for_tag}"
          fi

          git fetch --force --tags
          if ! git rev-parse --verify --quiet "refs/tags/${release_tag}^{commit}" >/dev/null; then
            echo "Release tag does not exist: ${release_tag}" >&2
            echo "Create and push the tag before building release assets." >&2
            exit 1
          fi

          git checkout --detach "refs/tags/${release_tag}"

          if [[ -n "${PACKAGE_VERSION_INPUT}" ]]; then
            package_version="${PACKAGE_VERSION_INPUT#v}"
          else
            package_version="$(scripts/package-version)"
            if [[ "${release_tag}" == v* && "${package_version}" != "${release_tag#v}" ]]; then
              echo "VERSION (${package_version}) does not match release tag (${release_tag})." >&2
              echo "Update VERSION or pass package_version explicitly for exceptional rebuilds." >&2
              exit 1
            fi
          fi

          echo "package_version=${package_version}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "checkout_ref=refs/tags/${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "Selected package version: ${package_version}"
          echo "Selected release tag: ${release_tag}"

      - name: Resolve versions
        id: versions
        env:
          VERSION_INPUT: ${{ inputs.python_version || 'manifest-all' }}
          TARGET_INPUT: ${{ inputs.target || 'all' }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import pathlib
          import tomllib

          requested = os.environ["VERSION_INPUT"].strip()
          if requested and requested not in {"manifest-all", "manifest-latest"}:
              versions = [requested.removeprefix("v")]
          else:
              versions = []
              for manifest in sorted(pathlib.Path("patches").glob("*/series.toml")):
                  data = tomllib.loads(manifest.read_text())
                  verified = data.get("verified_applies") or []
                  if verified:
                      if requested == "manifest-latest":
                          versions.append(verified[-1])
                      else:
                          versions.extend(verified)

          if not versions:
              raise SystemExit("No CPython versions selected")

          versions = list(dict.fromkeys(versions))
          target = (os.environ["TARGET_INPUT"].strip() or "all")
          posix_platforms = [
              {"target": "linux-x64", "os": "ubuntu-24.04"},
              {"target": "linux-arm64", "os": "ubuntu-24.04-arm"},
              {"target": "macos-intel", "os": "macos-15-intel"},
              {"target": "macos-arm64", "os": "macos-15"},
          ]
          windows_platforms = [
              {
                  "target": "windows-x64",
                  "os": "windows-2022",
                  "pcbuild-platform": "x64",
                  "pcbuild-output": "amd64",
                  "pcbuild-test-platform": "-x64",
              },
              {
                  "target": "windows-x86",
                  "os": "windows-2022",
                  "pcbuild-platform": "Win32",
                  "pcbuild-output": "win32",
                  "pcbuild-test-platform": "-win32",
              },
              {
                  "target": "windows-arm64",
                  "os": "windows-11-arm",
                  "pcbuild-platform": "ARM64",
                  "pcbuild-output": "arm64",
                  "pcbuild-test-platform": "-arm64",
              },
          ]

          all_targets = {item["target"] for item in posix_platforms + windows_platforms}
          all_targets.add("none")
          if target != "all" and target not in all_targets:
              raise SystemExit(f"Unsupported target: {target}")
          if target == "none":
              posix_platforms = []
              windows_platforms = []
          elif target != "all":
              posix_platforms = [
                  item for item in posix_platforms if item["target"] == target
              ]
              windows_platforms = [
                  item for item in windows_platforms if item["target"] == target
              ]

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              print(f"versions={json.dumps(versions)}", file=output)
              print(f"posix_platforms={json.dumps(posix_platforms)}", file=output)
              print(f"windows_platforms={json.dumps(windows_platforms)}", file=output)
              print(f"has_posix={str(bool(posix_platforms)).lower()}", file=output)
              print(f"has_windows={str(bool(windows_platforms)).lower()}", file=output)

          print("Selected CPython versions:", ", ".join(versions))
          print(
              "Selected platform targets:",
              ", ".join(item["target"] for item in posix_platforms + windows_platforms),
          )
          PY

  posix:
    name: ${{ matrix.python-version }} ${{ matrix.platform.target }}
    needs: versions
    if: needs.versions.outputs.has_posix == 'true'
    runs-on: ${{ matrix.platform.os }}
    timeout-minutes: 360
    env:
      PACKAGE_VERSION: ${{ needs.versions.outputs.package_version }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(needs.versions.outputs.versions) }}
        platform: ${{ fromJSON(needs.versions.outputs.posix_platforms) }}
    steps:
      - name: Check out retrace-cpython
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.versions.outputs.checkout_ref }}

      - name: Set up Python for docs tooling
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libbz2-dev \
            libdb-dev \
            libffi-dev \
            libgdbm-dev \
            liblzma-dev \
            libncursesw5-dev \
            libreadline-dev \
            libsqlite3-dev \
            libssl-dev \
            tk-dev \
            uuid-dev \
            zlib1g-dev

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install pkg-config openssl@3 xz gdbm tcl-tk mpdecimal zstd

      - name: Configure build environment
        shell: bash
        run: |
          set -euo pipefail
          patched_flags=()
          vanilla_flags=()

          if [[ "${RELEASE_BUILD}" == "true" ]]; then
            patched_flags+=(--enable-optimizations --with-lto)
          fi

          if [[ "${RUNNER_OS}" == "macOS" ]]; then
            openssl_prefix="$(brew --prefix openssl@3)"
            gdbm_prefix="$(brew --prefix gdbm)"
            patched_flags+=(--with-openssl="${openssl_prefix}")
            vanilla_flags+=(--with-openssl="${openssl_prefix}")
            {
              echo "GDBM_CFLAGS=-I${gdbm_prefix}/include"
              echo "GDBM_LIBS=-L${gdbm_prefix}/lib -lgdbm"
            } >> "${GITHUB_ENV}"
          fi

          {
            echo "CONFIGURE_FLAGS<<EOF"
            printf '%s\n' "${patched_flags[*]}"
            echo "EOF"
            echo "VANILLA_CONFIGURE_FLAGS<<EOF"
            printf '%s\n' "${vanilla_flags[*]}"
            echo "EOF"
          } >> "${GITHUB_ENV}"

      - name: Build and install vanilla CPython
        env:
          JOBS: 4
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: |
          set -euo pipefail
          repo_url="${CPYTHON_REPO_URL:-https://github.com/python/cpython.git}"
          vanilla_source="${GITHUB_WORKSPACE}/build/src/cpython-${PYTHON_VERSION}+vanilla"
          vanilla_prefix="${GITHUB_WORKSPACE}/build/vanilla/${PYTHON_VERSION}"
          git clone --branch "v${PYTHON_VERSION}" --depth 1 "${repo_url}" "${vanilla_source}"
          (
            cd "${vanilla_source}"
            ./configure --prefix="${vanilla_prefix}" ${VANILLA_CONFIGURE_FLAGS:-}
            make -j"${JOBS}"
            make install
          )

      - name: Apply patch stack
        run: scripts/apply-patches "${{ matrix.python-version }}"

      - name: Build patched CPython executable
        env:
          JOBS: 4
        run: |
          set -euo pipefail
          source_dir="${GITHUB_WORKSPACE}/build/src/cpython-${{ matrix.python-version }}+retrace"
          (
            cd "${source_dir}"
            ./configure ${CONFIGURE_FLAGS:-}
            make -j"${JOBS}"
          )

      - name: Run patched CPython test suite
        if: env.SKIP_TESTS != 'true'
        run: |
          set -euo pipefail
          source_dir="${GITHUB_WORKSPACE}/build/src/cpython-${{ matrix.python-version }}+retrace"
          make -C "${source_dir}" buildbottest

      - name: Validate patched executable against vanilla install
        run: |
          set -euo pipefail
          source_dir="${GITHUB_WORKSPACE}/build/src/cpython-${{ matrix.python-version }}+retrace"
          patched_python="${source_dir}/python.exe"
          if [[ ! -f "${patched_python}" || ! -x "${patched_python}" ]]; then
            patched_python="${source_dir}/python"
          fi
          if [[ ! -f "${patched_python}" || ! -x "${patched_python}" ]]; then
            echo "No patched Python executable found in ${source_dir}" >&2
            find "${source_dir}" -maxdepth 1 -type f -perm -111 -print >&2
            exit 1
          fi
          smoke_tests=(
            tests/smoke/probe_capability.py
            tests/smoke/thread_handoff.py
            tests/smoke/thread_id_determinism.py
            tests/smoke/thread_probe_concurrency.py
          )
          scripts/test-against-vanilla \
            "${patched_python}" \
            "${GITHUB_WORKSPACE}/build/vanilla/${{ matrix.python-version }}" \
            --version "${{ matrix.python-version }}" \
            "${smoke_tests[@]}"

      - name: Install docs dependencies
        run: python3 -m pip install -r requirements-docs.txt

      - name: Build docs and LLM references
        run: python3 scripts/build-docs

      - name: Package minimal runtime overlay
        run: |
          scripts/package-runtime \
            "${{ matrix.python-version }}" \
            "${{ matrix.platform.target }}" \
            "build/src/cpython-${{ matrix.python-version }}+retrace"

      - name: Build PyPI wheel
        run: |
          scripts/package-wheel \
            "${{ matrix.python-version }}" \
            "${PACKAGE_VERSION}" \
            "${{ matrix.platform.target }}" \
            "build/package/retrace-cpython-${{ matrix.python-version }}-${{ matrix.platform.target }}" \
            --docs-dir build/site

      - name: Upload wheel artifact
        if: |
          env.UPLOAD_ARTIFACTS == 'true' ||
          env.UPLOAD_RELEASE_ASSETS == 'true' ||
          env.PUBLISH_PYPI == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: retracesoftware-cpython-wheel-${{ matrix.python-version }}-${{ matrix.platform.target }}
          path: build/wheelhouse/*.whl
          if-no-files-found: error

      - name: Upload build archive
        if: env.UPLOAD_ARTIFACTS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: retrace-cpython-${{ matrix.python-version }}-${{ matrix.platform.target }}
          path: build/dist/*.tar.gz
          if-no-files-found: error

  windows:
    name: ${{ matrix.python-version }} ${{ matrix.platform.target }}
    needs: versions
    if: needs.versions.outputs.has_windows == 'true'
    runs-on: ${{ matrix.platform.os }}
    timeout-minutes: 360
    env:
      PACKAGE_VERSION: ${{ needs.versions.outputs.package_version }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(needs.versions.outputs.versions) }}
        platform: ${{ fromJSON(needs.versions.outputs.windows_platforms) }}
    steps:
      - name: Check out retrace-cpython
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.versions.outputs.checkout_ref }}

      - name: Set up Python for patch manifest parsing
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Apply patch stack
        shell: bash
        env:
          PYTHON: python
        run: scripts/apply-patches "${{ matrix.python-version }}"

      - name: Check out vanilla CPython
        shell: pwsh
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: |
          $repo = if ($env:CPYTHON_REPO_URL) { $env:CPYTHON_REPO_URL } else { "https://github.com/python/cpython.git" }
          $vanilla = Join-Path $env:GITHUB_WORKSPACE "build/src/cpython-$env:PYTHON_VERSION+vanilla"
          git clone --branch "v$env:PYTHON_VERSION" --depth 1 $repo $vanilla

      - name: Build patched CPython
        shell: pwsh
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
          PCBUILD_PLATFORM: ${{ matrix.platform.pcbuild-platform }}
        run: |
          $source = Join-Path $env:GITHUB_WORKSPACE "build/src/cpython-$env:PYTHON_VERSION+retrace"
          Push-Location $source
          .\PCbuild\build.bat -e -p $env:PCBUILD_PLATFORM -c Release
          if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
          }

      - name: Run patched CPython test suite
        if: env.SKIP_TESTS != 'true'
        shell: pwsh
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
          PCBUILD_TEST_PLATFORM: ${{ matrix.platform.pcbuild-test-platform }}
        run: |
          $source = Join-Path $env:GITHUB_WORKSPACE "build/src/cpython-$env:PYTHON_VERSION+retrace"
          Push-Location $source
          .\PCbuild\rt.bat -q $env:PCBUILD_TEST_PLATFORM -uall -rwW --slowest --timeout=1200 --fail-env-changed -j1
          if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
          }

      - name: Build and install vanilla CPython
        shell: pwsh
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
          PCBUILD_PLATFORM: ${{ matrix.platform.pcbuild-platform }}
          PCBUILD_OUTPUT: ${{ matrix.platform.pcbuild-output }}
        run: |
          $vanilla = Join-Path $env:GITHUB_WORKSPACE "build/src/cpython-$env:PYTHON_VERSION+vanilla"
          Push-Location $vanilla
          .\PCbuild\build.bat -e -p $env:PCBUILD_PLATFORM -c Release
          if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
          }
          $vanillaBuild = Join-Path $vanilla "PCbuild/$env:PCBUILD_OUTPUT"
          $vanillaHome = Join-Path $env:GITHUB_WORKSPACE "build/vanilla/$env:PYTHON_VERSION-$env:PCBUILD_OUTPUT"
          $vanillaPython = Join-Path $vanillaBuild "python.exe"
          & $vanillaPython "$vanilla/PC/layout" `
            --source $vanilla `
            --build $vanillaBuild `
            --copy $vanillaHome `
            --arch $env:PCBUILD_OUTPUT
          if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
          }

      - name: Validate patched executable against vanilla home
        shell: pwsh
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
          PCBUILD_OUTPUT: ${{ matrix.platform.pcbuild-output }}
        run: |
          $source = Join-Path $env:GITHUB_WORKSPACE "build/src/cpython-$env:PYTHON_VERSION+retrace"
          $vanilla = Join-Path $env:GITHUB_WORKSPACE "build/vanilla/$env:PYTHON_VERSION-$env:PCBUILD_OUTPUT"
          $python = Join-Path $source "PCbuild/$env:PCBUILD_OUTPUT/python.exe"
          $smokeTests = @(
            "$env:GITHUB_WORKSPACE/tests/smoke/probe_capability.py",
            "$env:GITHUB_WORKSPACE/tests/smoke/thread_handoff.py",
            "$env:GITHUB_WORKSPACE/tests/smoke/thread_id_determinism.py",
            "$env:GITHUB_WORKSPACE/tests/smoke/thread_probe_concurrency.py"
          )
          python "$env:GITHUB_WORKSPACE/scripts/test-against-vanilla" `
            $python `
            $vanilla `
            --version $env:PYTHON_VERSION `
            $smokeTests

      - name: Install docs dependencies
        shell: pwsh
        run: python -m pip install -r requirements-docs.txt

      - name: Build docs and LLM references
        shell: pwsh
        run: python scripts/build-docs

      - name: Package minimal runtime overlay
        shell: pwsh
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
          TARGET: ${{ matrix.platform.target }}
          PCBUILD_OUTPUT: ${{ matrix.platform.pcbuild-output }}
        run: |
          $source = Join-Path $env:GITHUB_WORKSPACE "build/src/cpython-$env:PYTHON_VERSION+retrace"
          $runtime = Join-Path $source "PCbuild/$env:PCBUILD_OUTPUT"
          python "$env:GITHUB_WORKSPACE/scripts/package-runtime" `
            $env:PYTHON_VERSION `
            $env:TARGET `
            $runtime

      - name: Build PyPI wheel
        shell: pwsh
        env:
          PACKAGE_VERSION: ${{ env.PACKAGE_VERSION }}
          PYTHON_VERSION: ${{ matrix.python-version }}
          TARGET: ${{ matrix.platform.target }}
        run: |
          $runtime = Join-Path $env:GITHUB_WORKSPACE "build/package/retrace-cpython-$env:PYTHON_VERSION-$env:TARGET"
          python "$env:GITHUB_WORKSPACE/scripts/package-wheel" `
            $env:PYTHON_VERSION `
            $env:PACKAGE_VERSION `
            $env:TARGET `
            $runtime `
            --docs-dir `
            build/site

      - name: Upload wheel artifact
        if: |
          env.UPLOAD_ARTIFACTS == 'true' ||
          env.UPLOAD_RELEASE_ASSETS == 'true' ||
          env.PUBLISH_PYPI == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: retracesoftware-cpython-wheel-${{ matrix.python-version }}-${{ matrix.platform.target }}
          path: build/wheelhouse/*.whl
          if-no-files-found: error

      - name: Upload build archive
        if: env.UPLOAD_ARTIFACTS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: retrace-cpython-${{ matrix.python-version }}-${{ matrix.platform.target }}
          path: build/dist/*.zip
          if-no-files-found: error

  upload-release-assets:
    name: Upload missing wheels to GitHub Release
    if: |
      (inputs.upload_release_assets == true || inputs.publish_pypi == true) &&
      always() &&
      (needs.posix.result == 'success' || needs.posix.result == 'skipped') &&
      (needs.windows.result == 'success' || needs.windows.result == 'skipped') &&
      (needs.posix.result == 'success' || needs.windows.result == 'success')
    needs:
      - versions
      - posix
      - windows
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: write
    steps:
      - name: Check out retrace-cpython
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.versions.outputs.checkout_ref }}

      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: retracesoftware-cpython-wheel-*
          path: dist
          merge-multiple: true

      - name: Upload missing release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.versions.outputs.release_tag }}
          PACKAGE_VERSION: ${{ needs.versions.outputs.package_version }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          wheels=(dist/*.whl)
          if (( ${#wheels[@]} == 0 )); then
            echo "No wheels downloaded from this workflow run." >&2
            exit 1
          fi

          if ! gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release create "${RELEASE_TAG}" \
              --verify-tag \
              --title "retracesoftware-cpython ${PACKAGE_VERSION}" \
              --notes "Wheel artifacts for retracesoftware-cpython ${PACKAGE_VERSION}."
          fi

          gh release view "${RELEASE_TAG}" \
            --json assets \
            --jq '.assets[].name' > existing-assets.txt

          for wheel in "${wheels[@]}"; do
            name="$(basename "${wheel}")"
            if grep -Fxq "${name}" existing-assets.txt; then
              echo "Release asset already exists, skipping: ${name}"
              continue
            fi
            echo "Uploading release asset: ${name}"
            gh release upload "${RELEASE_TAG}" "${wheel}"
          done

  publish-pypi:
    name: Publish release wheels to PyPI
    if: |
      inputs.publish_pypi == true &&
      always() &&
      (needs['upload-release-assets'].result == 'success' ||
       needs['upload-release-assets'].result == 'skipped')
    needs:
      - versions
      - upload-release-assets
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out retrace-cpython
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.versions.outputs.checkout_ref }}

      - name: Download wheel assets from GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.versions.outputs.release_tag }}
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "${RELEASE_TAG}" --pattern '*.whl' --dir dist
          find dist -name '*.whl' -type f -print -quit | grep -q .

      - name: List distributions
        run: ls -lh dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
